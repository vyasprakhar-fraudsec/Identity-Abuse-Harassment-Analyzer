name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          pip install flake8 black isort

      - name: Run flake8 (style + error check)
        run: |
          flake8 src/ --max-line-length=100 --ignore=E203,W503,W292,W293,F401 --count --statistics

      - name: Check black formatting
        run: |
          black --check --diff src/ || true

      - name: Check import ordering (isort)
        run: |
          isort --check-only --diff src/ || true

  test-install:
    name: Dependency Install Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify src imports
        run: |
          cd src && python -c "from utils import load_config, clean_text; from label_maps import LABEL_TO_ID_3CLASS; print('All imports OK')"
